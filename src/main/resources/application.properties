# GitHub API configuration
# GitHub API token — optional; if absent, GitHub issue creation will use an unauthenticated client
app.github-api-token=${GITHUB_API_TOKEN:}
app.github-maps-org-name=triplea-maps
app.triplea-org-name=triplea-game
app.error-reporting-repo=triplea

# Map indexing configuration
app.map-indexing-enabled=${MAP_INDEXING_ENABLED:false}
# How often (in minutes) the full indexing pass runs
app.map-indexing-period-minutes=${MAP_INDEXING_PERIOD_MINUTES:300}
# Full duration string consumed by @Scheduled — composed from the minutes value above
app.map-indexing-period-duration=${MAP_INDEXING_PERIOD_MINUTES:300}m

# HTTP server
quarkus.http.port=${HTTP_PORT:8080}
# Trust X-Forwarded-For headers set by a reverse proxy (e.g. NGINX)
quarkus.http.proxy.proxy-address-forwarding=true

# Database - production only; dev/test use Dev Services (auto-started via Testcontainers)
%prod.quarkus.datasource.db-kind=postgresql

# Production datasource — explicit URL from environment; dev/test use Dev Services instead
%prod.quarkus.datasource.username=${DATABASE_USER:support_user}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD:support_user}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_URL:localhost:5432/support_db}

# Flyway - apply migrations on startup
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# Logging
quarkus.log.level=INFO

# --- Test profile overrides ---
# Dev Services auto-starts a disposable Postgres container via Testcontainers; no manual docker compose step needed.
%test.quarkus.datasource.devservices.db-name=support_db
%test.quarkus.datasource.devservices.username=support_user
%test.quarkus.datasource.devservices.password=support_user

# Disable the map-indexing scheduler entirely during tests to avoid GitHub API calls
%test.quarkus.scheduler.enabled=false
