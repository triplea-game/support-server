- id: 1004
  map_name: 1941_global_command_decision
  repo_url: https://github.com/triplea-maps/1941_global_command_decision
  default_branch: master
  description: "<br>\n<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>1941 GLOBAL COMMAND DECISION</b>\n<br>by Black Elk (graphics/testing) & TheDog (code/testing)\n<br>\n<br><b>Introduction</b>\n<br>It is late 1941; Germany has launched a massive invasion against the USSR and Japan is ready to strike at the USA in the Pacific.\n<br>\n<br><b>FEATURES</b>\n<br>• Massive map 16816x8085px=136Mpx, one of the biggest TripleA maps.  Unit size 54px high, this is with 4K screens in mind.\n<br>• Nearly 800 land & sea locations, with terrain effects, Desert, Forest, Marsh, Tundra, Urban, impassable mountains, canals\n<br>\n<br>• Stacking limit is enforced to help the AI.  Only 10 Air & 10 Sea units are allowed per Sea Zone/Territory.  Only 20 Land per Territory.\n<br>• AI friendly, no Objectives, or Politics/Technology phases, both are scripted.  79 territories marked to guide the AI for better play.\n<br>\n<br>• Sea Zones are worth 1-2pu/turn and for Britain and Japan are vital for their survival\n<br>• All land territories bordering Sea Zones can be blockaded.  There are no convoy centres/route/zones.\n<br>\n<br>• Four Lend-Lease-Depots, 3 in USSR Archangelsk, Persian Corridor to Baku, Vladivostok  and Burma Road to Yunnan China\n<br>• Four types of HQ Commands, Air, Army, Fleet and Submarine, nations can have between none and five types of a HQ.  \n<br>&nbsp;&nbsp;&nbsp;&nbsp;These represent Rommel, Montgomery, Patton, Cunningham, Donitz, Nimitz, US 8th Air Force HQs etc. and their staff.\n<br>• Four different type of “Factory”\n<br>\n<br>• As a minimum requires TripleA 2.7.14848+\n<br>\n<br>For the latest download and discussion, copy and paste the link below\n<br>\n<br><a href=\"https://forums.triplea-game.org/topic/3326/1941-global-command-decision\">https://forums.triplea-game.org/topic/3326/1941-global-command-decision</a>\n<br>\n<br>"
