# Launches a Postgres database and runs Flyway migrations.
# Used by integration tests (testInteg source set) and for local development.

services:
  database:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGUSER: postgres
    volumes:
      - ./database/init/01-init-database.sql:/docker-entrypoint-initdb.d/01-init-database.sql
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: pg_isready -U support_user -d support_db
      interval: 3s
      retries: 10
      timeout: 3s
  support_server:
    build:
      dockerfile: Dockerfile
    environment:
        - DATABASE_USER=support_user
        - DATABASE_PASSWORD=support_user
        - DB_URL=database:5432/support_db
    ports:
      - "${SERVER_PORT}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 5s
      retries: 10
      timeout: 3s
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
