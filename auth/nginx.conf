# Local auth overlay for the support-server.
#
# nginx terminates browser traffic on :8000, performs an auth_request subrequest against
# oauth2-proxy (:4180), and forwards to the Quarkus app (:8080) with *sanitized* X-Auth-* identity
# headers.
#
# Header sanitization is the security crux: EVERY location that reaches the app sets X-Auth-Email /
# X-Auth-Groups explicitly (from the auth subrequest, or to empty), so a browser can never spoof
# identity by sending its own X-Auth-* headers — proxy_set_header overrides any client-supplied value.

upstream support_app  { server 127.0.0.1:8080; }
upstream oauth2_proxy { server 127.0.0.1:4180; }

server {
    listen 8000;
    server_name localhost;

    # --- oauth2-proxy endpoints: sign-in / callback / sign-out, and the auth subrequest ---
    location /oauth2/ {
        proxy_pass         http://oauth2_proxy;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
    }

    # Internal auth check. Returns 202 (authenticated) or 401 (not). Body is not forwarded.
    location = /oauth2/auth {
        internal;
        proxy_pass              http://oauth2_proxy;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length   "";
        proxy_set_header        Host             $host;
        proxy_set_header        X-Real-IP        $remote_addr;
        proxy_set_header        X-Forwarded-Uri  $request_uri;
    }

    # --- Hard-gated: admin / attribute catalog (members only). Unauthenticated -> login. ---
    location /support/admin/ {
        auth_request /oauth2/auth;
        error_page 401 = @oauth2_signin;

        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

        proxy_set_header X-Auth-Email      $auth_email;
        proxy_set_header X-Auth-Groups     $auth_groups;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://support_app;
    }

    # --- Optional-auth: public status page. Authenticated -> identity headers; anon -> empty. ---
    location /support/maps/status {
        auth_request /oauth2/auth;
        error_page 401 = @status_anon;

        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

        proxy_set_header X-Auth-Email      $auth_email;
        proxy_set_header X-Auth-Groups     $auth_groups;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://support_app;
    }

    # Anonymous fall-through for the optional-auth status page: sanitized (empty) identity.
    location @status_anon {
        proxy_set_header X-Auth-Email      "";
        proxy_set_header X-Auth-Groups     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://support_app;
    }

    # Redirect to oauth2-proxy login, preserving the originally-requested URL.
    location @oauth2_signin {
        return 302 /oauth2/start?rd=$scheme://$host$request_uri;
    }

    # --- Everything else (game-client APIs, etc.): public, sanitized anonymous. ---
    location / {
        proxy_set_header X-Auth-Email      "";
        proxy_set_header X-Auth-Groups     "";
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://support_app;
    }
}
